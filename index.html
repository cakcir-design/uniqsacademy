<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniqs · IMAT Yoğun Hazırlık Kampı</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Başlangıcı */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --gold: #FF6B00; --gold-mid: #FF8C33; --gold-pale: #FFE8D6; --teal: #2BAFA0; --white: #FFFFFF; --text-dark: #1A2422; --text-mid: #3D5450; --border: rgba(43,175,160,0.18); }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text-dark); line-height: 1.7; }
        
        nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; }
        .nav-logo img { height: 30px; }
        .nav-links { display: flex; gap: 2rem; list-style: none; }
        .nav-links a { text-decoration: none; color: var(--text-mid); font-size: 0.8rem; text-transform: uppercase; }
        .nav-cta { background: var(--gold); color: #fff; padding: 0.5rem 1.2rem; border-radius: 4px; text-decoration: none; font-weight: 700; font-size: 0.8rem; }
        
        .hero { text-align: center; padding: 5rem 2rem; background: #FFF5EE; }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3rem; margin-bottom: 1rem; color: var(--text-dark); }
        .hero h1 em { color: var(--gold); font-style: italic; }
        
        section { padding: 4rem 2rem; max-width: 900px; margin: 0 auto; }
        .section-title { font-family: 'Playfair Display', serif; margin-bottom: 2rem; text-align: center; }
        
        /* SSS Bölümü Stili */
        .faq-item { border: 1px solid var(--border); margin-bottom: 1rem; border-radius: 6px; overflow: hidden; }
        .faq-question { width: 100%; padding: 1.2rem; background: #fff; border: none; text-align: left; font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; }
        .faq-answer { display: none; padding: 1rem; background: #fafafa; border-top: 1px solid var(--border); }
        .faq-item.open .faq-answer { display: block; }

        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
<body>

    <nav>
        <a class='nav-logo' href='/'><img alt='Logo' src='https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhiKmnuiExz168vuomgiUml_EsTT5oyMR-_epx752Y-k4WkTa5AJKPTwAPyRi4WkznnAkkDIxsRmgWUy-9lDhYt8iK9cXu8hacj808ycoG3wxs86MYdOokpFL4A02pfSFGUGXXk0LXaYYl4hrnCfkqPPbHj879DWKHN5WE0BTUY733Kpd1GJHEC11PbPO4/s320/uniqs-logo.png'/></a>
        <ul class='nav-links'>
            <li><a href='#program'>Program</a></li>
            <li><a href='#sss'>SSS</a></li>
        </ul>
        <a class='nav-cta' href='#'>WhatsApp</a>
    </nav>

    <section class='hero'>
        <h1>IMAT Yoğun <em>Hazırlık Kampı</em></h1>
        <p>İtalya'da tıp hayaline Uniqs ile yaklaş.</p>
    </section>

    <section id='sss'>
        <h2 class='section-title'>Sıkça Sorulan Sorular</h2>
        <div class='faq-item'>
            <button class='faq-question'>Kamp ne zaman başlıyor? <span>+</span></button>
            <div class='faq-answer'>Kampımız Eylül ayında başlayıp sınav tarihine kadar devam etmektedir.</div>
        </div>
        <div class='faq-item'>
            <button class='faq-question'>Dersler nerede yapılıyor? <span>+</span></button>
            <div class='faq-answer'>Tüm derslerimiz profesyonel platformlar üzerinden canlı ve interaktif gerçekleşmektedir.</div>
        </div>
    </section>

    <script>
        document.querySelectorAll('.faq-question').forEach(button => {
            button.addEventListener('click', () => {
                button.parentElement.classList.toggle('open');
            });
        });
    </script>
</body>
</html>
