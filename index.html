<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uniqs · IMAT Yoğun Hazırlık Kampı</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* CSS Kodların Buraya Gelecek (Blogger'daki <b:skin> içindeki kodları kopyalayıp buraya yapıştırabilirsin) */
        /* ÖNEMLİ: CSS kodlarının başındaki <![CDATA[ ve sonundaki ]]> kısımlarını SİL! */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root { --gold: #FF6B00; --gold-mid: #FF8C33; --gold-light: #2BAFA0; --gold-pale: #FFE8D6; --gold-xpale: #FFF5EE; --teal: #2BAFA0; --teal-light: #E6F7F5; --white: #FFFFFF; --text-dark: #1A2422; --text-mid: #3D5450; --text-muted: #7A9E99; --border: rgba(43,175,160,0.18); --border-strong: rgba(255,107,0,0.4); }
        body { font-family: 'Inter', sans-serif; background: var(--white); color: var(--text-dark); line-height: 1.7; }
        /* CSS'inin geri kalanını buraya eklemeye devam et... */
    </style>
</head>
<body>
    <!-- Buraya Blogger'daki <body> içeriğini olduğu gibi kopyala (sadece b:section ve b:widget kısımlarını SİL) -->
    <nav>...</nav>

    <!-- ... Diğer tüm bölümler ... -->
</body>
